<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldShimmer 金粉ラメシマーデモ</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0e0c09;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    color: #f2e6c8;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100%;
    background: #0e0c09;
    background-image: radial-gradient(ellipse at 50% 45%, rgba(90,72,32,0.35) 0%, rgba(14,12,9,0) 55%),
                       radial-gradient(circle at 50% 50%, #1a1509 0%, #0e0c09 70%);
  }
  canvas#gold {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .panel {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(20,16,8,0.78);
    border: 1px solid #5a4a20;
    padding: 12px 14px;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    width: 268px;
  }
  .panel.show {
    display: flex;
  }
  .row-top {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .panel button {
    background: #241d0f;
    color: #e3c878;
    border: 1px solid #6b5628;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .panel button.active {
    background: #b8933f;
    color: #1a1509;
    border-color: #b8933f;
  }
  #settings {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .colors-row {
    display: flex;
    gap: 12px;
    font-size: 11px;
    align-items: center;
    flex-wrap: wrap;
  }
  .colors-row label {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .colors-row input[type=color] {
    width: 30px;
    height: 20px;
    padding: 0;
    border: none;
    background: none;
  }
  .slider-row {
    display: grid;
    grid-template-columns: 74px 1fr 42px;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .slider-row input[type=range] {
    width: 100%;
    height: 14px;
    accent-color: #b8933f;
  }
  .slider-row .val {
    text-align: right;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .caption {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.1em;
    opacity: 0.55;
    z-index: 10;
    white-space: nowrap;
    display: none;
  }
  .caption.show {
    display: block;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gold" data-gold-shimmer data-mode="cursor" data-background="dark" data-color-a="#d4af37" data-color-b="#fff3c4"></canvas>
  <div class="panel" id="panel">
    <div class="row-top">
      <button id="btn-cursor" class="active">カーソル追従</button>
      <button id="btn-ambient">アンビエント</button>
    </div>
    <div id="settings">
      <div class="btn-row">
        <button id="btn-bg-dark" class="active">ダーク背景</button>
        <button id="btn-bg-light">ライト背景</button>
      </div>
      <div class="colors-row">
        <label>色A <input id="colorA" type="color" value="#d4af37"></label>
        <label>色B <input id="colorB" type="color" value="#fff3c4"></label>
      </div>
      <div id="sliders"></div>
      <div class="btn-row">
        <label style="font-size:11px; display:flex; align-items:center; gap:4px;">
          <input id="chk-pointer-trail" type="checkbox" checked> 尾を引く
        </label>
      </div>
      <div class="btn-row">
        <span class="row-label" style="font-size:11px; opacity:0.7;">発生</span>
        <button id="btn-emit-move" class="active">移動</button>
        <button id="btn-emit-click">クリック</button>
      </div>
      <div class="btn-row">
        <button id="btn-reset">リセット</button>
        <button id="btn-copy">コピー(JSON)</button>
      </div>
    </div>
  </div>
  <div class="caption">金粉ラメシマー &mdash; WebGL2 / オリジナル実装</div>
</div>

<script src="gold-shimmer.js"></script>
<script>
  window.addEventListener('load', function () {
    var canvas = document.getElementById('gold');
    var fx = canvas._goldShimmerInstance;

    var DEFAULTS = {
      mode: 'cursor',
      background: 'dark',
      colorA: '#d4af37',
      colorB: '#fff3c4',
      particleCount: 3000,
      speed: 1,
      size: 1,
      twinkleRate: 1,
      swirlStrength: 1,
      pointerTrail: true,
      pointerEmit: 'move'
    };

    var SLIDERS = [
      { key: 'particleCount', label: '粒子数',   min: 100, max: 10000, step: 100, dec: 0 },
      { key: 'speed',         label: '速度',     min: 0.05, max: 5,    step: 0.05, dec: 2 },
      { key: 'size',          label: 'サイズ',   min: 0.2, max: 4,     step: 0.05, dec: 2 },
      { key: 'twinkleRate',   label: 'きらめき', min: 0,   max: 3,     step: 0.05, dec: 2 },
      { key: 'swirlStrength', label: '渦強さ',   min: 0,   max: 3,     step: 0.05, dec: 2 }
    ];

    var inputs = {};
    var slidersHost = document.getElementById('sliders');
    SLIDERS.forEach(function (cfg) {
      var row = document.createElement('div');
      row.className = 'slider-row';
      var name = document.createElement('span');
      name.textContent = cfg.label;
      var input = document.createElement('input');
      input.type = 'range';
      input.min = cfg.min;
      input.max = cfg.max;
      input.step = cfg.step;
      input.value = DEFAULTS[cfg.key];
      var val = document.createElement('span');
      val.className = 'val';
      val.textContent = Number(DEFAULTS[cfg.key]).toFixed(cfg.dec);
      input.addEventListener('input', function () {
        var v = parseFloat(input.value);
        val.textContent = v.toFixed(cfg.dec);
        var patch = {};
        patch[cfg.key] = v;
        fx.setParams(patch);
      });
      row.appendChild(name);
      row.appendChild(input);
      row.appendChild(val);
      slidersHost.appendChild(row);
      inputs[cfg.key] = { input: input, val: val, dec: cfg.dec };
    });

    function currentSettings() {
      var out = {
        mode: fx.mode,
        background: fx.background,
        colorA: document.getElementById('colorA').value,
        colorB: document.getElementById('colorB').value,
        pointerTrail: fx.pointerTrail,
        pointerEmit: fx.pointerEmit
      };
      SLIDERS.forEach(function (cfg) {
        out[cfg.key] = parseFloat(inputs[cfg.key].input.value);
      });
      return out;
    }

    function setModeButtons(mode) {
      document.getElementById('btn-cursor').classList.toggle('active', mode === 'cursor');
      document.getElementById('btn-ambient').classList.toggle('active', mode === 'ambient');
    }

    function setBgButtons(bg) {
      document.getElementById('btn-bg-dark').classList.toggle('active', bg === 'dark');
      document.getElementById('btn-bg-light').classList.toggle('active', bg === 'light');
    }

    function setEmitButtons(emit) {
      document.getElementById('btn-emit-move').classList.toggle('active', emit !== 'click');
      document.getElementById('btn-emit-click').classList.toggle('active', emit === 'click');
    }

    function applySettings(s) {
      SLIDERS.forEach(function (cfg) {
        if (s[cfg.key] == null) return;
        inputs[cfg.key].input.value = s[cfg.key];
        inputs[cfg.key].val.textContent = Number(s[cfg.key]).toFixed(cfg.dec);
      });
      if (s.colorA) document.getElementById('colorA').value = s.colorA;
      if (s.colorB) document.getElementById('colorB').value = s.colorB;
      if (s.pointerTrail != null) document.getElementById('chk-pointer-trail').checked = s.pointerTrail;
      if (s.pointerEmit != null) setEmitButtons(s.pointerEmit);
      fx.setParams(s);
      if (s.mode) setModeButtons(s.mode);
      if (s.background) setBgButtons(s.background);
    }

    document.getElementById('btn-cursor').addEventListener('click', function () {
      fx.setMode('cursor');
      setModeButtons('cursor');
    });
    document.getElementById('btn-ambient').addEventListener('click', function () {
      fx.setMode('ambient');
      setModeButtons('ambient');
    });
    document.getElementById('chk-pointer-trail').addEventListener('change', function (e) {
      fx.setPointerTrail(e.target.checked);
    });
    document.getElementById('btn-emit-move').addEventListener('click', function () {
      fx.setPointerEmit('move');
      setEmitButtons('move');
    });
    document.getElementById('btn-emit-click').addEventListener('click', function () {
      fx.setPointerEmit('click');
      setEmitButtons('click');
    });
    document.getElementById('btn-bg-dark').addEventListener('click', function () {
      fx.setBackground('dark');
      setBgButtons('dark');
    });
    document.getElementById('btn-bg-light').addEventListener('click', function () {
      fx.setBackground('light');
      setBgButtons('light');
    });
    document.getElementById('btn-reset').addEventListener('click', function () {
      applySettings(DEFAULTS);
    });
    document.getElementById('btn-copy').addEventListener('click', function () {
      var json = JSON.stringify(currentSettings(), null, 2);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json);
      }
    });
    document.getElementById('colorA').addEventListener('input', function (e) {
      fx.setColors(e.target.value, document.getElementById('colorB').value);
    });
    document.getElementById('colorB').addEventListener('input', function (e) {
      fx.setColors(document.getElementById('colorA').value, e.target.value);
    });

    // UI hidden by default; ?ui=1 (or ?ui=true) reveals the settings panel + caption.
    var uiParam = new URLSearchParams(location.search).get('ui');
    var showUi = uiParam === '1' || uiParam === 'true';
    document.getElementById('panel').classList.toggle('show', showUi);
    document.querySelector('.caption').classList.toggle('show', showUi);
  });
</script>
</body>
</html>
