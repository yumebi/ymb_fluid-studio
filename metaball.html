<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViscousFluid デモ</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0d0b0c;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    color: #f2e9e4;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }
  canvas#fluid {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .panel {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.35);
    padding: 12px 16px;
    border-radius: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    backdrop-filter: blur(4px);
  }
  .panel button {
    background: #2a1418;
    color: #f2e9e4;
    border: 1px solid #7a1f2b;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .panel button.active {
    background: #7a1f2b;
  }
  .panel label {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .caption {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.1em;
    opacity: 0.6;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="fluid" data-viscous-fluid data-mode="cursor" data-color-a="#4a0f16" data-color-b="#f0b8ae" data-viscosity="0.5" data-blob-count="6"></canvas>
  <div class="panel">
    <button id="btn-cursor" class="active">カーソル追従</button>
    <button id="btn-ambient">背景アンビエント</button>
    <label>粘度 <input id="viscosity" type="range" min="0" max="0.9" step="0.01" value="0.5"></label>
    <label>色A <input id="colorA" type="color" value="#4a0f16"></label>
    <label>色B <input id="colorB" type="color" value="#f0b8ae"></label>
  </div>
  <div class="caption">原液系ヴィスカスリキッドエフェクト &mdash; WebGL2 / オリジナル実装</div>
</div>

<script src="viscous-fluid.js"></script>
<script>
  window.addEventListener('load', function () {
    var canvas = document.getElementById('fluid');
    var fx = canvas._viscousFluidInstance;

    document.getElementById('btn-cursor').addEventListener('click', function () {
      fx.setMode('cursor');
      this.classList.add('active');
      document.getElementById('btn-ambient').classList.remove('active');
    });
    document.getElementById('btn-ambient').addEventListener('click', function () {
      fx.setMode('ambient');
      this.classList.add('active');
      document.getElementById('btn-cursor').classList.remove('active');
    });
    document.getElementById('viscosity').addEventListener('input', function (e) {
      fx.setViscosity(parseFloat(e.target.value));
    });
    document.getElementById('colorA').addEventListener('input', function (e) {
      fx.setColors(e.target.value, document.getElementById('colorB').value);
    });
    document.getElementById('colorB').addEventListener('input', function (e) {
      fx.setColors(document.getElementById('colorA').value, e.target.value);
    });
  });
</script>
</body>
</html>
