<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinFilm 薄膜干渉パールデモ</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #faf8f6;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    color: #3a2328;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100%;
  }
  canvas#film {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .panel {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(255,255,255,0.8);
    border: 1px solid #e5dce8;
    padding: 12px 14px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 12px rgba(120,80,140,0.1);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    width: 264px;
  }
  .row-top {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .panel button {
    background: #f7f0f9;
    color: #6a3d80;
    border: 1px solid #cdb3d6;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .panel button.active {
    background: #6a3d80;
    color: #f7f0f9;
    border-color: #6a3d80;
  }
  #settings {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .panel.open #settings {
    display: flex;
  }
  .colors-row {
    display: flex;
    gap: 12px;
    font-size: 11px;
    align-items: center;
  }
  .colors-row label {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .colors-row input[type=color] {
    width: 30px;
    height: 20px;
    padding: 0;
    border: none;
    background: none;
  }
  .slider-row {
    display: grid;
    grid-template-columns: 74px 1fr 42px;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .slider-row input[type=range] {
    width: 100%;
    height: 14px;
    accent-color: #6a3d80;
  }
  .slider-row .val {
    text-align: right;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .caption {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.1em;
    opacity: 0.55;
    z-index: 10;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="film" data-thin-film data-mode="cursor" data-background="light" data-color-a="#f6f2ee" data-color-b="#dcc8e8"></canvas>
  <div class="panel" id="panel">
    <div class="row-top">
      <button id="btn-cursor" class="active">カーソル追従</button>
      <button id="btn-ambient">アンビエント</button>
      <button id="btn-settings">設定</button>
    </div>
    <div id="settings">
      <div class="btn-row">
        <button id="btn-bg-light" class="active">ライト背景</button>
        <button id="btn-bg-dark">ダーク背景</button>
      </div>
      <div class="colors-row">
        <label>色A <input id="colorA" type="color" value="#f6f2ee"></label>
        <label>色B <input id="colorB" type="color" value="#dcc8e8"></label>
      </div>
      <div id="sliders"></div>
      <div class="btn-row">
        <label style="font-size:11px; display:flex; align-items:center; gap:4px;">
          <input id="chk-pointer-trail" type="checkbox" checked> 尾を引く
        </label>
      </div>
      <div class="btn-row">
        <span class="row-label" style="font-size:11px; opacity:0.7;">発生</span>
        <button id="btn-emit-move" class="active">移動</button>
        <button id="btn-emit-click">クリック</button>
      </div>
      <div class="btn-row">
        <button id="btn-reset">リセット</button>
        <button id="btn-copy">コピー(JSON)</button>
      </div>
    </div>
  </div>
  <div class="caption">薄膜干渉パール &mdash; WebGL2 / オリジナル実装</div>
</div>

<script src="thin-film.js"></script>
<script>
  window.addEventListener('load', function () {
    var canvas = document.getElementById('film');
    var fx = canvas._thinFilmInstance;

    var DEFAULTS = {
      mode: 'cursor',
      background: 'light',
      colorA: '#f6f2ee',
      colorB: '#dcc8e8',
      hueShift: 0,
      intensity: 0.6,
      scale: 3.2,
      flowSpeed: 1,
      rippleStrength: 1,
      pointerTrail: true,
      pointerEmit: 'move'
    };

    var SLIDERS = [
      { key: 'hueShift',       label: '色相シフト', min: 0,   max: 1,  step: 0.01, dec: 2 },
      { key: 'intensity',      label: '虹の強さ',   min: 0,   max: 1,  step: 0.01, dec: 2 },
      { key: 'scale',          label: '縞の細かさ', min: 0.2, max: 12, step: 0.1,  dec: 1 },
      { key: 'flowSpeed',      label: '流れの速さ', min: 0,   max: 4,  step: 0.05, dec: 2 },
      { key: 'rippleStrength', label: '波紋強さ',   min: 0,   max: 3,  step: 0.05, dec: 2 }
    ];

    var inputs = {};
    var slidersHost = document.getElementById('sliders');
    SLIDERS.forEach(function (cfg) {
      var row = document.createElement('div');
      row.className = 'slider-row';
      var name = document.createElement('span');
      name.textContent = cfg.label;
      var input = document.createElement('input');
      input.type = 'range';
      input.min = cfg.min;
      input.max = cfg.max;
      input.step = cfg.step;
      input.value = DEFAULTS[cfg.key];
      var val = document.createElement('span');
      val.className = 'val';
      val.textContent = Number(DEFAULTS[cfg.key]).toFixed(cfg.dec);
      input.addEventListener('input', function () {
        var v = parseFloat(input.value);
        val.textContent = v.toFixed(cfg.dec);
        var patch = {};
        patch[cfg.key] = v;
        fx.setParams(patch);
      });
      row.appendChild(name);
      row.appendChild(input);
      row.appendChild(val);
      slidersHost.appendChild(row);
      inputs[cfg.key] = { input: input, val: val, dec: cfg.dec };
    });

    function currentSettings() {
      var out = {
        mode: fx.mode,
        background: fx.background,
        colorA: document.getElementById('colorA').value,
        colorB: document.getElementById('colorB').value,
        pointerTrail: fx.pointerTrail,
        pointerEmit: fx.pointerEmit
      };
      SLIDERS.forEach(function (cfg) {
        out[cfg.key] = parseFloat(inputs[cfg.key].input.value);
      });
      return out;
    }

    function setModeButtons(mode) {
      document.getElementById('btn-cursor').classList.toggle('active', mode === 'cursor');
      document.getElementById('btn-ambient').classList.toggle('active', mode === 'ambient');
    }

    function setBgButtons(bg) {
      document.getElementById('btn-bg-light').classList.toggle('active', bg === 'light');
      document.getElementById('btn-bg-dark').classList.toggle('active', bg === 'dark');
      document.body.style.background = bg === 'dark' ? '#141018' : '#faf8f6';
    }

    function setEmitButtons(emit) {
      document.getElementById('btn-emit-move').classList.toggle('active', emit !== 'click');
      document.getElementById('btn-emit-click').classList.toggle('active', emit === 'click');
    }

    function applySettings(s) {
      SLIDERS.forEach(function (cfg) {
        if (s[cfg.key] == null) return;
        inputs[cfg.key].input.value = s[cfg.key];
        inputs[cfg.key].val.textContent = Number(s[cfg.key]).toFixed(cfg.dec);
      });
      if (s.colorA) document.getElementById('colorA').value = s.colorA;
      if (s.colorB) document.getElementById('colorB').value = s.colorB;
      if (s.pointerTrail != null) document.getElementById('chk-pointer-trail').checked = s.pointerTrail;
      if (s.pointerEmit != null) setEmitButtons(s.pointerEmit);
      fx.setParams(s);
      if (s.mode) setModeButtons(s.mode);
      if (s.background) setBgButtons(s.background);
    }

    document.getElementById('btn-cursor').addEventListener('click', function () {
      fx.setMode('cursor');
      setModeButtons('cursor');
    });
    document.getElementById('btn-ambient').addEventListener('click', function () {
      fx.setMode('ambient');
      setModeButtons('ambient');
    });
    document.getElementById('btn-settings').addEventListener('click', function () {
      document.getElementById('panel').classList.toggle('open');
    });
    document.getElementById('chk-pointer-trail').addEventListener('change', function (e) {
      fx.setPointerTrail(e.target.checked);
    });
    document.getElementById('btn-emit-move').addEventListener('click', function () {
      fx.setPointerEmit('move');
      setEmitButtons('move');
    });
    document.getElementById('btn-emit-click').addEventListener('click', function () {
      fx.setPointerEmit('click');
      setEmitButtons('click');
    });
    document.getElementById('btn-bg-light').addEventListener('click', function () {
      fx.setBackground('light');
      setBgButtons('light');
    });
    document.getElementById('btn-bg-dark').addEventListener('click', function () {
      fx.setBackground('dark');
      setBgButtons('dark');
    });
    document.getElementById('btn-reset').addEventListener('click', function () {
      applySettings(DEFAULTS);
    });
    document.getElementById('btn-copy').addEventListener('click', function () {
      var json = JSON.stringify(currentSettings(), null, 2);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json);
      }
    });
    document.getElementById('colorA').addEventListener('input', function (e) {
      fx.setColors(e.target.value, document.getElementById('colorB').value);
    });
    document.getElementById('colorB').addEventListener('input', function (e) {
      fx.setColors(document.getElementById('colorA').value, e.target.value);
    });

    // UI hidden by default; ?ui=1 (or ?ui=true) reveals the settings panel + caption.
    var uiParam = new URLSearchParams(location.search).get('ui');
    var showUi = uiParam === '1' || uiParam === 'true';
    document.getElementById('panel').style.display = showUi ? 'flex' : 'none';
    document.querySelector('.caption').style.display = showUi ? 'block' : 'none';
  });
</script>
</body>
</html>
